services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-medpalto.us.kg}
      ACME_EMAIL: ${ACME_EMAIL:-admin@medpalto.us.kg}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  app_data:
  caddy_data:
  caddy_config:
