services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_data:
